<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/Action">
        <div>
            <h1>Feedback Form</h1>
        </div>
        <div>
            <label for="Name">Name:</label>
            <input type="text" name="Name" id="Name" placeholder="Write your Name">
            <br>
            <label for="Email">Email:</label>
            <input type="email" name="Email" id="Email" placeholder="Write Your Email id">
        </div>
        <div>
            <label for="Message">Message:</label><br>
            <textarea name="Message" id="Message" placeholder="Write Some Message"></textarea>
        </div>
        <div>
            <label for="Rate">Rate Us Out Of 5</label><br>
            <input type="radio" name="Rate" id="1">
            <label for="1">1</label><br>
            <input type="radio" name="Rate" id="2">
            <label for="2">2</label><br>
            <input type="radio" name="Rate" id="3">
            <label for="3">3</label><br>
            <input type="radio" name="Rate" id="4">
            <label for="4">4</label><br>
            <input type="radio" name="Rate" id="5">
            <label for="5">5</label><br>
        </div>
        <div>
            <button>Send Your Message</button>
        </div>
    </form>
</body>
</html>
