<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width", initial-scale="1.0">
    <title>Document</title>
</head>
<body>
    <p>The difference between the tags &lt;li&gt;,&lt;ul&gt; , and &lt;ol&gt; are given below</p>
    <p>This is unorder list</p>
    <ul>
        <li>Ashu</li>
        <li>Papi</li>
    </ul>
    <p>This is order list</p>
    <ol>
        <li>Ashu</li>
        <li>Papi</li>
    </ol>
    <p>Unorder list of three programming languages are given below</p>
    <ul>
        <li>C Language</li>
        <li>Java</li>
        <li>C++</li>
        <li>Python</li>
        <li>PHP</li>
    </ul>
</body>
</html>
