<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/action">
    <div>
        <input type="checkbox" name="query" id="query" checked>
        <label for="query">I am 18+</label>
    </div>
    <div>
        <input type="radio" name="fruit" id="1" value="Apple">
        <label for="1">Apple</label>
        <input type="radio" name="fruit" id="2" value="Orange">
        <label for="2">Orange</label>
        <input type="radio" name="fruit" id="3" value="Mango">
        <label for="3">Mango</label>
    </div>
    <div>
        <button>Submit</button>
    </div>
    </form>
</body>
</html>
